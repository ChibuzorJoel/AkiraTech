<header class="header">

  <div class="nav-container">

    <!-- Hamburger Menu ( Mobile) -->
    <div class="hamburger-menu" [class.active]="isMenuOpen" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Logo -->
    <div class="logo">
      <img src="assets/img/logo.jpeg" alt="Akiira Tech Logo">
      <span class="brand-name">AKIIRA <span class="tech">TECH</span></span>
    </div>

    <!-- Navigation (Desktop) -->
    <nav class="nav-links">
      <a routerLink="/">Home</a>
      <a routerLink="/services">Services</a>
      <a routerLink="/projects">Projects</a>
      <a routerLink="/about">About</a>
      <a routerLink="/contact">Contact</a>
      <a routerLink="/register" class="register-nav-btn">Register Now 🎓</a>
      
    </nav>

    <!-- CTA (Desktop) -->
    <div class="cta">
      <a class="contact-btn" routerLink="/contact">Get Started</a>
    </div>

    
    

  </div>

  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" [class.active]="isMenuOpen" (click)="closeMenu()"></div>

  <!-- Sidebar (Mobile) -->
  <div class="sidebar" [class.active]="isMenuOpen">
    
    <!-- Sidebar Close Button -->
    <div class="sidebar-header">
      <button class="close-btn" (click)="closeMenu()" aria-label="Close menu">
        <span>✕</span>
      </button>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar-nav">
      <a routerLink="/" (click)="closeMenu()">Home</a>
      <a routerLink="/services" (click)="closeMenu()">Services</a>
      <a routerLink="/projects" (click)="closeMenu()">Projects</a>
      <a routerLink="/about" (click)="closeMenu()">About</a>
      <a routerLink="/contact" (click)="closeMenu()">Contact</a>
      <a routerLink="/register" (click)="closeMenu()">Register Now 🎓</a>
      
    </nav>
  </div>

</header>
