<!-- src/app/pages/login/login.component.html -->
<div class="login-page">
    <div class="login-left">
      <div class="brand-block">
        <div class="brand-mark">AT</div>
        <h1>AKIIRA <span>TECH</span></h1>
        <p>Admin Dashboard</p>
      </div>
      <div class="login-tagline">
        <h2>Manage registrations,<br>track growth, stay in control.</h2>
        <div class="feature-list">
          <div class="feature-item"><span class="fi-dot"></span> Real-time registration tracking</div>
          <div class="feature-item"><span class="fi-dot"></span> Student status management</div>
          <div class="feature-item"><span class="fi-dot"></span> Analytics dashboard</div>
          <div class="feature-item"><span class="fi-dot"></span> Email notifications</div>
        </div>
      </div>
    </div>
  
    <div class="login-right">
      <div class="login-card">
        <h2>Welcome back</h2>
        <p class="login-sub">Sign in to your admin account</p>
  
        <div class="error-banner" *ngIf="errorMsg">
          <span>⚠️ {{ errorMsg }}</span>
        </div>
  
        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="admin@akiira-tech.com"
            (keyup.enter)="login()"
            [class.input-error]="submitted && !email">
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              placeholder="••••••••"
              (keyup.enter)="login()"
              [class.input-error]="submitted && !password">
            <button class="toggle-pw" (click)="showPassword = !showPassword" type="button">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>
  
        <button class="login-btn" (click)="login()" [disabled]="loading">
          <span *ngIf="!loading">Sign In →</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
  
        
      </div>
    </div>
  </div>
