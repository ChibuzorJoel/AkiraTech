<!-- sidebar.component.html -->
<aside class="sidebar" [class.collapsed]="collapsed">
    <div class="sidebar-header">
      <div class="brand" *ngIf="!collapsed">
        <div class="brand-mark">AT</div>
        <div>
          <span class="brand-name">AKIIRA <span>TECH</span></span>
          <span class="brand-sub">Admin</span>
        </div>
      </div>
      <div class="brand-mark" *ngIf="collapsed">AT</div>
      <button class="collapse-btn" (click)="collapsed = !collapsed">
        {{ collapsed ? '→' : '←' }}
      </button>
    </div>
  
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span class="nav-label" *ngIf="!collapsed">Dashboard</span>
      </a>
      <a routerLink="/registrations" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span>
        <span class="nav-label" *ngIf="!collapsed">Registrations</span>
      </a>
      <a routerLink="/admin/contact" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">✉️</span>
        <span class="nav-label" *ngIf="!collapsed">Contacts</span>
      </a>
    </nav>
  
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span>
        <span *ngIf="!collapsed">Logout</span>
      </button>
    </div>
  </aside>
